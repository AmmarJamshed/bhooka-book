# Weekly Peekaboo Guru card-offer scraper for Karachi restaurants
# Card discounts change infrequently — runs every Monday at 1:30 PM PKT.
#
# Required GitHub secrets:
#   DATABASE_URL — postgresql+asyncpg://postgres:PASSWORD@db.fpyfshycjtqqrfggvcay.supabase.co:5432/postgres

name: Weekly Peekaboo Card Offers Scraper

on:
  schedule:
    - cron: "30 8 * * 1"  # Monday 1:30 PM PKT (8:30 AM UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt httpx

      - name: Run Peekaboo scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set in GitHub repository secrets"
            exit 1
          fi
          python scripts/peekaboo_scraper.py
