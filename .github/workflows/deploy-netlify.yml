# Deploy frontend to Netlify on push to main/master
# Uses netlify.toml + @netlify/plugin-nextjs for Next.js SSR
#
# Required GitHub secrets:
#   NETLIFY_AUTH_TOKEN  — from https://app.netlify.com/user/applications
#   NETLIFY_SITE_ID     — 536c8ea3-dd14-4ecf-b89f-69d122a086a0
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   GROQ_API_KEY        — for AI Concierge (/api/ai/chat)

name: Deploy to Netlify

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure Netlify runtime env
        run: |
          netlify env:set GROQ_API_KEY "${{ secrets.GROQ_API_KEY }}" --context production --force
          netlify env:set GROQ_MODEL "llama-3.3-70b-versatile" --context production --force
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify
        run: netlify deploy --prod --build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NEXT_PUBLIC_SUPABASE_URL: https://fpyfshycjtqqrfggvcay.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
