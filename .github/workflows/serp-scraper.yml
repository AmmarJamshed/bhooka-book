# Daily SERP API scraper — runs at 1pm PKT (8:00 UTC)
# Scrapes Google Maps popular times once daily, stores in Supabase,
# then generates hourly rush forecasts for the rest of the day.

name: Daily SERP Traffic Scraper

on:
  schedule:
    # 1:00 PM PKT = 8:00 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run SERP scraper
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/serp_scraper.py

      - name: Report status
        if: always()
        run: echo "SERP scrape job completed at $(date -u)"
